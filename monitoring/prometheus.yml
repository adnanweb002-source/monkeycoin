global:
  scrape_interval: 15s

scrape_configs:
  - job_name: nestjs
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:3000

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121